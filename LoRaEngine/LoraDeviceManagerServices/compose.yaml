services:
  loradevicemanagerservices:
    build:
      context: ../
      dockerfile: ./LoraDeviceManagerServices/Dockerfile
      args:
        - TargetFramework=net8.0  # must be a TFM: https://learn.microsoft.com/en-us/dotnet/standard/frameworks#latest-versions
    image: russellgm/loradevicemanagerservices:2.2.3
    ports:
      - "80:80"
    depends_on:
       redis:
         condition: service_started
       azurite:
         condition: service_started
    environment:
        - AzureWebJobsSecretStorageType=files
        - ConnectionStrings:RedisConnectionString=redis:6379
        - ConnectionStrings:IoTHubConnectionString=HostName=experimentshub.azure-devices.net;SharedAccessKeyName=iothubowner;SharedAccessKey=VnaZUhFTLM0j72s67iwLvnH0kWN0lifQdAIoTGhWECA=
        - ConnectionStrings:StorageConnectionString=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
        - appSettings:ServiceValidatesTenant=false
        - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1; #"UseDevelopmentStorage=true  #doesn't seem to need this for some reason'
    volumes:
        - ./functionkey.json:/azure-functions-host/Secrets/host.json
    restart: 
        always
  redis:
    image: ghcr.io/microsoft/garnet
    ulimits:
        memlock: -1
    restart: 
        always
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    # container_name: "azurite"
    # hostname: azurite
    restart: always
    # ports:
    #   - "10000:10000"
    #   - "10001:10001"
    #   - "10002:10002"